name: E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".claude/**"
      - ".serena/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".claude/**"
      - ".serena/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run e2e tests
        run: nix develop --command go test -tags e2e -race -timeout 120s -v ./e2e/...
