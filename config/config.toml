log_level = "info"

[grpc]
port = 50051
subscriber_buffer_size = 64

[enricher]
workers = 4

[chainlink]
cache_ttl = "30s"
staleness_threshold = "2h"

[engine]
default_window_ttl = "30s"
prune_interval = "5s"
max_window_size = 10000

[pipeline]
raw_event_buffer = 512
chain_event_buffer = 256
enriched_event_buffer = 64
signal_buffer = 32

[chains.ethereum]
rpc_url = "wss://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
mode = "websocket"
poll_interval = "12s"
event_buffer = 256
backoff.initial = "1s"
backoff.max = "30s"
backoff.max_retries = 10

[chains.solana]
rpc_url = "wss://api.mainnet-beta.solana.com"
event_buffer = 1024
backoff.initial = "500ms"
backoff.max = "15s"
backoff.max_retries = 20

# Operational tuning — internal buffer and cache sizes.
# log_channel_buffer sizes the raw log channel inside WebSocket/Polling strategies (RPC-facing).
# This is different from per-chain event_buffer, which sizes the pipeline-facing events channel.
[tuning]
block_cache_size = 100
log_channel_buffer = 256

[telemetry]
enabled = true
otlp_endpoint = "localhost:4317"
otlp_insecure = true
http_port = 9090
service_name = "x-chain-oracle"
service_version = "0.1.0"
environment = "development"

[telemetry.tracing]
sample_ratio = 1.0
batch_timeout = "5s"

[telemetry.tracing.stages]
adapter = true
normalizer = true
enricher = true
engine = true
emitter = true

[telemetry.metrics]
export_interval = "10s"

[telemetry.metrics.histogram_buckets]
latency_ms = [1, 5, 10, 25, 50, 100, 250, 500, 1000, 5000]
amount_usd = [10, 100, 1000, 10000, 100000, 1000000]
